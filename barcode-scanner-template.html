<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Food Scanner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ZXing browser library — fallback for iOS Safari WebView where BarcodeDetector is absent -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>
  :root {
    --bg: #faf6f0;
    --paper: #ffffff;
    --ink: #2b2a26;
    --ink-soft: #6b6760;
    --line: #e6dfd2;
    --accent: #c5532f;
    --accent-soft: #f4d9cb;
    --good: #4a7c59;
    --bad: #b04525;
    --shadow: 0 1px 2px rgba(43, 42, 38, 0.04), 0 8px 24px rgba(43, 42, 38, 0.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink); -webkit-font-smoothing: antialiased; overscroll-behavior: contain;
  }
  .app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
  .screen { flex: 1; display: none; flex-direction: column; padding: 28px 22px 32px; }
  .screen.active { display: flex; }

  h1, h2 {
    font-family: 'Cormorant Garamond', serif; font-weight: 600; margin: 0; color: var(--ink);
    letter-spacing: -0.01em; line-height: 1.15;
  }
  h1 { font-size: 34px; }
  h2 { font-size: 26px; }
  .subhead { color: var(--ink-soft); font-size: 15px; line-height: 1.55; margin: 10px 0 0; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .link-btn {
    background: none; border: none; color: var(--ink-soft); font-family: inherit; font-size: 13px;
    cursor: pointer; padding: 4px 0; text-decoration: underline; text-underline-offset: 3px;
  }
  .done-btn {
    background: none; border: 1px solid var(--line); color: var(--ink); font-family: inherit;
    font-size: 13px; padding: 6px 14px; border-radius: 999px; cursor: pointer;
  }
  .done-btn:hover { border-color: var(--accent); }

  .scan-hero { margin: 8px 0 28px; }
  .scan-hero .eyebrow {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent);
    font-weight: 500; margin-bottom: 10px;
  }

  .capture-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 18px;
    padding: 28px 22px; margin-top: 18px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .icon-camera {
    width: 64px; height: 64px; border-radius: 50%; background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center; color: var(--accent);
  }
  .icon-camera svg { width: 32px; height: 32px; }

  .primary-btn, .secondary-btn {
    font-family: inherit; font-size: 16px; font-weight: 500; padding: 14px 22px;
    border-radius: 12px; cursor: pointer; width: 100%; text-align: center;
    transition: opacity 0.12s ease; border: none;
  }
  .primary-btn { background: var(--accent); color: white; }
  .primary-btn:active { opacity: 0.85; }
  .secondary-btn { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .secondary-btn:hover { border-color: var(--accent); }

  .file-input-wrap { position: relative; width: 100%; }
  .file-input-wrap input[type="file"] {
    position: absolute; opacity: 0; inset: 0; width: 100%; height: 100%; cursor: pointer;
  }

  .divider {
    display: flex; align-items: center; gap: 12px; color: var(--ink-soft); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.15em; width: 100%;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .manual-form { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .manual-form input {
    font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 16px; padding: 14px 16px;
    border: 1px solid var(--line); border-radius: 10px; background: var(--bg); color: var(--ink);
    -webkit-appearance: none; width: 100%;
  }
  .manual-form input:focus { outline: none; border-color: var(--accent); background: var(--paper); }

  .status {
    margin-top: 22px; padding: 16px 18px; background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px; font-size: 14px; color: var(--ink-soft);
    display: none; align-items: center; gap: 12px;
  }
  .status.error { border-color: var(--bad); color: var(--bad); }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 18px;
    overflow: hidden; box-shadow: var(--shadow); margin-top: 18px;
  }
  .product-head { padding: 22px 22px 18px; border-bottom: 1px solid var(--line); }
  .product-brand { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); }
  .product-name {
    font-family: 'Cormorant Garamond', serif; font-size: 26px; line-height: 1.2;
    margin-top: 6px; font-weight: 600;
  }
  .nutri { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .nutri-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%; color: white; font-weight: 600; font-size: 16px;
  }
  .nutri-badge.a { background: #038141; }
  .nutri-badge.b { background: #85bb2f; }
  .nutri-badge.c { background: #fecb02; color: #2b2a26; }
  .nutri-badge.d { background: #ee8100; }
  .nutri-badge.e { background: #e63e11; }
  .nutri-badge.unknown { background: var(--ink-soft); }
  .nutri-label { font-size: 13px; color: var(--ink-soft); }

  .nutrition-strip {
    display: grid; grid-template-columns: repeat(4, 1fr); padding: 16px 0;
    border-bottom: 1px solid var(--line); background: var(--bg);
  }
  .nutrition-strip > div { text-align: center; padding: 4px 6px; }
  .nutrition-strip > div + div { border-left: 1px solid var(--line); }
  .nutrition-strip .v { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; }
  .nutrition-strip .l {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-top: 2px;
  }

  .swap-block { padding: 22px; }
  .swap-eyebrow {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent);
    font-weight: 500; margin-bottom: 10px;
  }
  .swap-body {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic;
    line-height: 1.4; color: var(--ink);
  }

  .scan-again-row { display: flex; gap: 12px; margin-top: 22px; }
  .scan-again-row > button { flex: 1; }

  .done-summary { text-align: center; margin: 40px 0; }
  .done-summary .check {
    width: 64px; height: 64px; border-radius: 50%; background: var(--good);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; color: white;
  }
  .scans-counter { font-size: 14px; color: var(--ink-soft); margin-top: 10px; }
</style>
</head>
<body>

<div class="app">

  <!-- ============ SCAN / CAPTURE ============ -->
  <section id="screen-scan" class="screen active">
    <div class="top-bar">
      <span></span>
      <button class="done-btn" id="doneBtn">Done</button>
    </div>

    <div class="scan-hero">
      <div class="eyebrow">Scan a barcode</div>
      <h1>Find healthier food.</h1>
      <p class="subhead">Take a photo of any product barcode. We'll show the nutrition and suggest a better swap.</p>
    </div>

    <div class="capture-card">
      <div class="icon-camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="file-input-wrap">
        <button class="primary-btn" id="captureBtnVisible" type="button">Take photo</button>
        <input type="file" id="captureInput" accept="image/*" capture="environment">
      </div>

      <div class="divider"><span>or</span></div>

      <form class="manual-form" id="manualForm">
        <input type="text" id="barcodeInput" inputmode="numeric" pattern="[0-9]*" placeholder="Enter barcode (e.g. 3017620422003)" maxlength="14">
        <button class="secondary-btn" type="submit">Look up</button>
      </form>
    </div>

    <div id="scanStatus" class="status"></div>
  </section>

  <!-- ============ RESULT ============ -->
  <section id="screen-result" class="screen">
    <div class="top-bar">
      <button class="link-btn" id="resultBackBtn">← back</button>
      <button class="done-btn" id="doneBtn2">Done</button>
    </div>

    <div class="result-card">
      <div class="product-head">
        <div class="product-brand" id="productBrand"></div>
        <div class="product-name" id="productName"></div>
        <div class="nutri" id="nutriRow"></div>
      </div>
      <div class="nutrition-strip" id="nutritionStrip"></div>
      <div class="swap-block">
        <div class="swap-eyebrow">Healthier swap</div>
        <div class="swap-body" id="swapBody"></div>
      </div>
    </div>

    <div class="scan-again-row">
      <button class="secondary-btn" id="scanAgainBtn">Scan another</button>
    </div>
  </section>

  <!-- ============ DONE ============ -->
  <section id="screen-done" class="screen">
    <div class="done-summary">
      <div class="check">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>All done</h2>
      <p class="subhead">Thanks for scanning today.</p>
      <p class="scans-counter" id="scansCounter"></p>
    </div>
  </section>

</div>

<script>
// ============================================================================
// Cogniss External Template: Barcode Food Scanner
// English only. Photo-capture (iOS-compatible). Per-scan QUESTION_RESPONSE.
// ============================================================================

// ---------- Bridge -----------------------------------------------------------
const isNative = typeof window.ReactNativeWebView !== 'undefined';

function postToApp(key, data) {
  const text = JSON.stringify({ key, data: data === undefined ? null : data });
  if (isNative) {
    window.ReactNativeWebView.postMessage(text);
  } else if (window.parent && window.parent !== window) {
    window.parent.postMessage(text, '*');
  }
}

const bridge = {};
const REQUIRED = ['ACTIVITY', 'QUESTIONS'];
let initialised = false;
let didQuit = false;

function onMessage(event) {
  try {
    const message = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    if (!message || !message.key) return;
    bridge[message.key] = message.data;
    if (!initialised && REQUIRED.every(k => bridge[k] !== undefined)) {
      initialised = true;
      // Small delay to allow trailing init messages (CONFIG etc.) to arrive
      setTimeout(initialise, 100);
    }
  } catch (e) { /* ignore malformed messages */ }
}
document.addEventListener('message', onMessage); // Android RN
window.addEventListener('message', onMessage);   // iOS RN + web

window.addEventListener('load', function() {
  postToApp('READY_DYNAMIC_MEDIA');
});

// ---------- State ------------------------------------------------------------
let scansLogged = 0;
let zxingReader = null;
let scanStartTime = Date.now();

// ---------- Init -------------------------------------------------------------
function initialise() {
  scanStartTime = Date.now();
  // Scan screen is already .active in the markup; no-op required, but if we
  // ever add gating logic we'd do it here.
}

// ---------- Screen routing ---------------------------------------------------
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id));
  if (id === 'screen-scan') scanStartTime = Date.now();
}

// ---------- Capture handlers -------------------------------------------------
document.getElementById('captureBtnVisible').addEventListener('click', () => {
  document.getElementById('captureInput').click();
});

document.getElementById('captureInput').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  setStatus('Reading the barcode…', false);
  try {
    const barcode = await decodeBarcodeFromFile(file);
    if (!barcode) {
      setStatus('Could not read a barcode from that photo. Try again or enter the number.', true);
      return;
    }
    await lookupAndShow(barcode);
  } catch (err) {
    setStatus('Could not read a barcode from that photo. Try again or enter the number.', true);
  } finally {
    e.target.value = ''; // allow re-pick of same file
  }
});

document.getElementById('manualForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const raw = document.getElementById('barcodeInput').value.trim();
  if (!/^\d{8,14}$/.test(raw)) {
    setStatus('Please enter a valid barcode (8–14 digits).', true);
    return;
  }
  await lookupAndShow(raw);
});

document.getElementById('resultBackBtn').addEventListener('click', () => {
  clearStatus();
  showScreen('screen-scan');
});

document.getElementById('scanAgainBtn').addEventListener('click', () => {
  clearStatus();
  document.getElementById('barcodeInput').value = '';
  showScreen('screen-scan');
});

document.getElementById('doneBtn').addEventListener('click', completeActivity);
document.getElementById('doneBtn2').addEventListener('click', completeActivity);

// ---------- Barcode decoding -------------------------------------------------
async function decodeBarcodeFromFile(file) {
  // Try native BarcodeDetector first (fast, no library, works on Android Chromium)
  if ('BarcodeDetector' in window) {
    try {
      const detector = new window.BarcodeDetector({
        formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128']
      });
      const bitmap = await createImageBitmap(file);
      const results = await detector.detect(bitmap);
      if (results && results.length > 0) return results[0].rawValue;
    } catch (e) { /* fall through */ }
  }
  // Fallback: @zxing/browser (iOS Safari WebView, Firefox, older browsers)
  if (window.ZXingBrowser) {
    try {
      if (!zxingReader) zxingReader = new window.ZXingBrowser.BrowserMultiFormatReader();
      const url = URL.createObjectURL(file);
      const img = await new Promise((resolve, reject) => {
        const i = new Image();
        i.onload = () => resolve(i);
        i.onerror = reject;
        i.src = url;
      });
      try {
        const result = await zxingReader.decodeFromImageElement(img);
        return result && result.getText ? result.getText() : null;
      } finally {
        URL.revokeObjectURL(url);
      }
    } catch (e) { /* not found */ }
  }
  return null;
}

// ---------- Open Food Facts --------------------------------------------------
async function lookupAndShow(barcode) {
  setStatus('Looking up product…', false);
  try {
    const fields = 'product_name,brands,nutriscore_grade,nova_group,nutriments,categories_tags';
    const url = `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(barcode)}.json?fields=${fields}`;
    const res = await fetch(url, { method: 'GET' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.status !== 1 || !json.product) {
      setStatus('Product not found. Try a different item or enter the number.', true);
      return;
    }
    renderResult(barcode, json.product);
    recordScanResponse(barcode, json.product);
    clearStatus();
    showScreen('screen-result');
  } catch (err) {
    setStatus('Could not reach the product database. Check your connection.', true);
  }
}

function renderResult(barcode, product) {
  const name = product.product_name || ('#' + barcode);
  const brand = (product.brands || '').split(',')[0].trim();
  const grade = (product.nutriscore_grade || '').toLowerCase();
  const n = product.nutriments || {};

  document.getElementById('productBrand').textContent = brand || 'Brand';
  document.getElementById('productName').textContent = name;

  const nutriRow = document.getElementById('nutriRow');
  if (grade && /[a-e]/.test(grade)) {
    nutriRow.innerHTML = `<span class="nutri-badge ${grade}">${grade.toUpperCase()}</span><span class="nutri-label">Nutri-Score</span>`;
  } else {
    nutriRow.innerHTML = `<span class="nutri-badge unknown">?</span><span class="nutri-label">No score available</span>`;
  }

  const strip = document.getElementById('nutritionStrip');
  const values = [
    { v: formatVal(n['energy-kcal_100g'], 'kcal'), l: 'Energy' },
    { v: formatVal(n['sugars_100g'], 'g'), l: 'Sugar' },
    { v: formatVal(n['fat_100g'], 'g'), l: 'Fat' },
    { v: formatVal(n['salt_100g'], 'g'), l: 'Salt' },
  ];
  strip.innerHTML = values.map(x => `<div><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('');

  const swap = pickSwap(product.categories_tags || [], grade);
  document.getElementById('swapBody').textContent = swap;
}

function formatVal(n, unit) {
  if (n === undefined || n === null || isNaN(n)) return '—';
  const v = Number(n);
  return (v >= 100 ? Math.round(v) : v.toFixed(1)) + (unit ? ' ' + unit : '');
}

function pickSwap(categoryTags, grade) {
  const swaps = (bridge.CONFIG && bridge.CONFIG.swaps) || {};
  for (const tag of categoryTags) {
    const key = tag.replace(/^[a-z]{2}:/, '');
    if (typeof swaps[key] === 'string') return swaps[key];
  }
  if ((grade === 'd' || grade === 'e') && typeof swaps.__generic_unhealthy === 'string') {
    return swaps.__generic_unhealthy;
  }
  return 'Whole, unprocessed foods are usually a better choice — fresh vegetables, fruit, legumes, or grains.';
}

// ---------- QUESTION_RESPONSE per scan --------------------------------------
// One response per scan. The `text` field carries a human-readable summary
// followed by a full JSON payload on the next line, so an analyst can read
// it directly in Insights and downstream systems can parse the JSON.
function recordScanResponse(barcode, product) {
  const questions = bridge.QUESTIONS || [];
  if (!questions.length) return;

  // Submit against the next available question; if we exceed the topic's
  // question count, keep submitting against the last one.
  const idx = Math.min(scansLogged, questions.length - 1);

  const n = product.nutriments || {};
  const nutrition = {
    energy_kcal_100g: n['energy-kcal_100g'] ?? null,
    sugars_100g: n['sugars_100g'] ?? null,
    saturated_fat_100g: n['saturated-fat_100g'] ?? null,
    fat_100g: n['fat_100g'] ?? null,
    salt_100g: n['salt_100g'] ?? null,
    fibre_100g: n['fiber_100g'] ?? null,
    proteins_100g: n['proteins_100g'] ?? null,
  };

  const elapsedMs = Date.now() - scanStartTime;

  // Full structured record — everything the analyst might want.
  const record = {
    barcode,
    product_name: product.product_name || null,
    brand: (product.brands || '').split(',')[0].trim() || null,
    nutriscore_grade: (product.nutriscore_grade || '').toUpperCase() || null,
    nova_group: product.nova_group ?? null,
    nutrition_per_100g: nutrition,
    response_time_ms: elapsedMs,
    scanned_at: new Date().toISOString(),
  };

  // Human-readable first line, then a JSON payload on the next.
  const humanLine = `${record.product_name || 'Unknown'} — ${barcode} — Nutri-Score ${record.nutriscore_grade || '?'} — ${Math.round(elapsedMs/1000)}s`;
  const responseText = humanLine + '\n' + JSON.stringify(record);

  postToApp('QUESTION_RESPONSE', {
    index: idx,
    text: responseText,
    // Cogniss `duration` is milliseconds — send raw elapsedMs.
    duration: elapsedMs,
    date: new Date().toISOString(),
  });

  scansLogged++;
  scanStartTime = Date.now();
}

// ---------- Completion -------------------------------------------------------
function completeActivity() {
  if (didQuit) return;
  didQuit = true;
  document.getElementById('scansCounter').textContent =
    `You scanned ${scansLogged} product${scansLogged === 1 ? '' : 's'}.`;
  showScreen('screen-done');
  setTimeout(() => {
    postToApp('QUIT', { completeState: 'COMPLETE', customScore: scansLogged });
  }, 1200);
}

// ---------- UI helpers -------------------------------------------------------
function setStatus(msg, isError) {
  const host = document.getElementById('scanStatus');
  host.className = 'status' + (isError ? ' error' : '');
  host.innerHTML = isError
    ? escapeHtml(msg)
    : `<span class="spinner"></span><span>${escapeHtml(msg)}</span>`;
  host.style.display = 'flex';
}
function clearStatus() {
  const host = document.getElementById('scanStatus');
  host.style.display = 'none';
  host.innerHTML = '';
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
</script>

</body>
</html>
